<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統平臺大冒險 | CYIT Classroom </title>
    
    <!-- 新增網站小圖示 -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- 1. 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 設定字型與 Retro 樣式 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap'); /* 像素字體 */
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f1ea; /* 蘑菇風米色背景 */
            color: #2c3e50;
            /* 背景網點顏色調淡 (#e8e4dc) */
            background-image: radial-gradient(#e8e4dc 2px, transparent 2px);
            background-size: 15px 15px;
            cursor: none; /* 隱藏預設游標 */
        }

        /* --- 自定義科技感滑鼠游標 --- */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2c3e50;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(44, 62, 80, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* 懸停在可點擊元素上的狀態 */
        body.hovering .cursor-outline {
            width: 60px;
            height: 60px;
            background-color: rgba(44, 62, 80, 0.1);
            border-color: transparent;
        }
        
        /* 點擊瞬間的狀態 */
        body.clicking .cursor-outline {
            width: 30px;
            height: 30px;
            border-color: #d35400;
            background-color: rgba(211, 84, 0, 0.1);
        }

        /* 點擊波紋特效 */
        .click-ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            background-color: rgba(211, 84, 0, 0.3);
            pointer-events: none;
            z-index: 9998;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Retro/Pixel Art Style Utilities */
        .retro-border {
            border: 4px solid #2c3e50;
        }
        
        .retro-shadow {
            box-shadow: 6px 6px 0px #2c3e50;
        }

        .retro-card {
            background-color: white;
            border: 4px solid #2c3e50;
            box-shadow: 6px 6px 0px #2c3e50;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* 更平滑的過渡 */
            position: relative;
            overflow: hidden; /* 為了波紋特效 */
        }

        .retro-card::after { /* 光影掃過特效 */
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: none;
        }

        .retro-card:hover::after {
            left: 200%;
            transition: left 0.6s ease-in-out;
        }

        .retro-card:hover {
            transform: translate(-3px, -3px) scale(1.01);
            box-shadow: 12px 12px 0px #2c3e50;
            border-color: #34495e;
        }

        .retro-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #2c3e50;
        }

        .retro-btn {
            border: 3px solid #2c3e50;
            font-weight: 900;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #2c3e50;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .retro-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #2c3e50;
        }

        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #2c3e50;
        }

        /* Tech Grid Background for Game */
        .tech-bg {
            background-color: #0f172a;
            background-image: 
                linear-gradient(rgba(0, 180, 50, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 50, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Animations */
        @keyframes pop-in {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 200, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* 翻轉卡片 */
        .rotate-y-180 { transform: rotateY(180deg); }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .perspective-1000 { perspective: 1000px; }
    </style>
</head>
<body>
    <!-- Custom Cursor Elements -->
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>
    
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Book, Cpu, Monitor, Coffee, ArrowRight, Star, CheckCircle, XCircle, 
            RefreshCw, Brain, Server, HardDrive, Keyboard, Smartphone, Cloud,
            Zap, LayoutGrid, Trophy, Heart, User, Play, Github
        } from 'https://esm.sh/lucide-react@0.263.1';

        // --- Mouse Effect Logic (Tech Circle Style) ---
        const useMouseEffect = () => {
            useEffect(() => {
                const cursorDot = document.querySelector('[data-cursor-dot]');
                const cursorOutline = document.querySelector('[data-cursor-outline]');
                
                const moveCursor = (e) => {
                    const posX = e.clientX;
                    const posY = e.clientY;

                    // Dot follows instantly
                    cursorDot.style.left = `${posX}px`;
                    cursorDot.style.top = `${posY}px`;

                    // Outline follows with delay (using simple animation here for smoothness)
                    cursorOutline.animate({
                        left: `${posX}px`,
                        top: `${posY}px`
                    }, { duration: 500, fill: "forwards" });
                };

                const handleMouseDown = () => document.body.classList.add('clicking');
                const handleMouseUp = () => document.body.classList.remove('clicking');

                // Hover effect for clickable elements
                const handleMouseOver = (e) => {
                    if (e.target.matches('button, a, .retro-card, .cursor-pointer')) {
                        document.body.classList.add('hovering');
                    }
                };
                const handleMouseOut = (e) => {
                    if (e.target.matches('button, a, .retro-card, .cursor-pointer')) {
                        document.body.classList.remove('hovering');
                    }
                };

                const createRipple = (e) => {
                    const ripple = document.createElement('div');
                    ripple.classList.add('click-ripple');
                    const size = 100; 
                    ripple.style.width = size + 'px';
                    ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - size / 2) + 'px';
                    ripple.style.top = (e.clientY - size / 2) + 'px';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                };

                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mousedown', handleMouseDown);
                window.addEventListener('mouseup', handleMouseUp);
                window.addEventListener('mouseover', handleMouseOver); // Event delegation for hover
                window.addEventListener('mouseout', handleMouseOut);
                window.addEventListener('click', createRipple);

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mousedown', handleMouseDown);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('mouseover', handleMouseOver);
                    window.removeEventListener('mouseout', handleMouseOut);
                    window.removeEventListener('click', createRipple);
                };
            }, []);
        };

        // --- Sound Helper (Web Audio API) ---
        const playSound = (type) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            const now = ctx.currentTime;

            if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'flip') {
                const bufferSize = ctx.sampleRate * 0.1; 
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                noise.start(now);
            } else if (type === 'step') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'win') {
                const frequencies = [523.25, 659.25, 783.99, 1046.50]; 
                frequencies.forEach((freq, i) => {
                    const noteOsc = ctx.createOscillator();
                    const noteGain = ctx.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(ctx.destination);
                    noteOsc.type = 'square';
                    noteOsc.frequency.value = freq;
                    const startTime = now + i * 0.1;
                    noteGain.gain.setValueAtTime(0.1, startTime);
                    noteGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                    noteOsc.start(startTime);
                    noteOsc.stop(startTime + 0.3);
                });
            }
        };

        // --- Components ---

        // 1. Navigation
        const Navbar = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'intro', label: '導覽大廳', icon: Book },
                { id: 'units', label: '電腦餐廳', icon: Coffee },
                { id: 'flow', label: '出餐流程', icon: ArrowRight },
                { id: 'cards', label: '學習卡', icon: Brain },
                { id: 'game', label: '大廚挑戰', icon: Star },
            ];

            return (
                React.createElement("nav", { className: "bg-white border-b-4 border-[#2c3e50] sticky top-0 z-50 px-4 py-3 shadow-lg" },
                    React.createElement("div", { className: "max-w-6xl mx-auto flex flex-wrap justify-center gap-2 sm:gap-4" },
                        tabs.map((tab) => (
                            React.createElement("button", {
                                key: tab.id,
                                onClick: () => setActiveTab(tab.id),
                                className: `
                                    flex items-center gap-2 px-4 py-2 font-bold text-sm sm:text-base rounded-lg transition-all
                                    ${activeTab === tab.id 
                                        ? 'bg-[#d35400] text-white shadow-[4px_4px_0px_#2c3e50] translate-y-[-2px]' 
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200 border-2 border-transparent hover:border-gray-300'}
                                `
                            },
                                React.createElement(tab.icon, { size: 20 }),
                                React.createElement("span", null, tab.label)
                            )
                        ))
                    )
                )
            );
        };

        // 2. Intro Section
        const IntroSection = ({ setTab }) => {
            const [selectedType, setSelectedType] = useState(null);

            const platformTypes = [
                { 
                    id: 'computer',
                    title: '電腦系統平臺', 
                    icon: Monitor,
                    bg: 'bg-blue-100',
                    category: '傳統系統平臺',
                    categoryColor: 'bg-orange-400',
                    desc: '傳統的桌上型或筆記型電腦。',
                    details: '這是我們最熟悉的電腦形式。特色是擁有完整的五大單元架構，運算能力強，適合執行複雜的軟體，如修圖、寫程式、做報告。',
                    example: '實例：桌上型電腦 (Desktop)、筆記型電腦 (Laptop)'
                },
                { 
                    id: 'portable',
                    title: '可攜式系統平臺', 
                    icon: Smartphone,
                    bg: 'bg-purple-100',
                    category: '新興系統平臺',
                    categoryColor: 'bg-purple-400',
                    desc: '小型、便於攜帶或穿戴的智慧裝置。',
                    details: '隨著科技進步，將電腦微型化。強調輕便與移動性，通常使用電池供電，系統經過簡化以省電。',
                    example: '實例：智慧型手機 (Smartphone)、平板電腦、智慧手錶 (Smart Watch)'
                },
                { 
                    id: 'embedded',
                    title: '嵌入式系統平臺', 
                    icon: Cpu, 
                    bg: 'bg-green-100',
                    category: '新興系統平臺',
                    categoryColor: 'bg-purple-400',
                    desc: '內建於設備中，執行特定功能的控制晶片。',
                    details: '通常外觀看不出是電腦，但內部有微處理器。專注於執行單一或特定的自動化功能，強調穩定性與自動化。',
                    example: '實例：智慧冷氣(自動調溫)、洗衣機、紅綠燈控制系統、汽車電腦'
                },
                { 
                    id: 'cloud',
                    title: '雲端系統平臺', 
                    icon: Cloud,
                    bg: 'bg-sky-100',
                    category: '新興系統平臺',
                    categoryColor: 'bg-purple-400',
                    desc: '透過網路使用遠端伺服器的運算服務。',
                    details: '運算不在本地端進行，而是由遠端強大的伺服器處理。支援多人同時連線、協作與大量資料儲存。',
                    example: '實例：Google 文件 (多人編輯)、iCloud、線上遊戲伺服器'
                },
            ];

            return (
                React.createElement("div", { className: "max-w-5xl mx-auto p-6 space-y-10 animate-pop-in pb-20" },
                    // Header
                    React.createElement("div", { className: "text-center space-y-4 py-6" },
                        React.createElement("h1", { 
                            className: "text-4xl md:text-6xl font-black text-[#2c3e50] tracking-tight",
                            style: { textShadow: '4px 4px 0px #f39c12' }
                        }, "🍄 系統平臺大冒險"),
                        React.createElement("p", { className: "text-xl text-gray-700 font-bold" },
                            "歡迎來到「電腦餐廳」！輕鬆搞懂電腦的五大核心單元"
                        )
                    ),

                    // Definition Section
                    React.createElement("div", { className: "retro-card p-8 rounded-none bg-white" },
                        React.createElement("div", { className: "flex items-center gap-3 mb-6 border-b-4 border-gray-200 pb-4" },
                            React.createElement(LayoutGrid, { size: 32, className: "text-[#d35400]" }),
                            React.createElement("h2", { className: "text-2xl md:text-3xl font-black text-[#2c3e50]" }, "什麼是系統平臺？")
                        ),
                        React.createElement("div", { className: "space-y-6" },
                            React.createElement("p", { className: "text-lg font-medium leading-relaxed" },
                                React.createElement("span", { className: "bg-[#f39c12] text-white px-2 py-1 rounded mr-2" }, "定義"),
                                "又稱為運算平臺 (Computing Platform)。就是利用電腦的運算能力，提供各項服務的環境。"
                            ),
                            React.createElement("div", { className: "bg-gray-50 border-4 border-gray-200 p-6" },
                                React.createElement("h3", { className: "font-bold text-lg mb-4 flex items-center gap-2" },
                                    "以「傳統電腦系統平臺」為例，它由三要素組成："
                                ),
                                React.createElement("ul", { className: "grid md:grid-cols-3 gap-4" },
                                    [
                                        { title: '硬體', icon: '🖥️', desc: '實體設備', sub: '主機、螢幕' },
                                        { title: '作業系統', icon: '⚙️', desc: '管理員', sub: 'Windows, iOS' },
                                        { title: '應用軟體', icon: '📱', desc: '工具', sub: 'Word, Line' }
                                    ].map((item, idx) => (
                                        React.createElement("li", { key: idx, className: "bg-white p-4 border-2 border-gray-800 text-center shadow-[4px_4px_0px_#ccc]" },
                                            React.createElement("div", { className: "text-3xl mb-2" }, item.icon),
                                            React.createElement("h4", { className: "font-black text-xl" }, item.title),
                                            React.createElement("p", { className: "text-sm text-gray-600 mt-1 font-bold" }, item.desc),
                                            React.createElement("p", { className: "text-xs text-gray-400 mt-1" }, item.sub)
                                        )
                                    ))
                                )
                            )
                        )
                    ),

                    // Types Section
                    React.createElement("div", { className: "space-y-6" },
                        React.createElement("div", { className: "flex items-center gap-3" },
                            React.createElement(Brain, { className: "text-[#27ae60]", size: 32 }),
                            React.createElement("h3", { className: "text-2xl font-black text-[#2c3e50]" }, "常見的系統平臺類型"),
                            React.createElement("span", { className: "hidden sm:block text-sm bg-[#2c3e50] text-white px-2 py-1 rounded" }, "點擊卡片看詳情")
                        ),
                        
                        React.createElement("div", { className: "grid md:grid-cols-2 gap-4" },
                            platformTypes.map((type) => (
                                React.createElement("div", { 
                                    key: type.id, 
                                    onClick: () => setSelectedType(type),
                                    className: `cursor-pointer p-5 border-4 border-[#2c3e50] shadow-[4px_4px_0px_#2c3e50] hover:translate-y-[-4px] hover:shadow-[8px_8px_0px_#2c3e50] transition-all flex items-start gap-4 bg-white relative overflow-hidden retro-card`
                                },
                                    // Category Label
                                    React.createElement("div", { className: `absolute top-0 right-0 ${type.categoryColor} text-white text-xs font-bold px-3 py-1 rounded-bl-lg z-10` },
                                        type.category
                                    ),
                                    React.createElement("div", { className: `p-3 rounded-lg border-2 border-[#2c3e50] ${type.bg}` },
                                        React.createElement(type.icon, { size: 28, className: "text-[#2c3e50]" })
                                    ),
                                    React.createElement("div", null,
                                        React.createElement("h4", { className: "font-black text-xl text-[#2c3e50]" }, type.title),
                                        React.createElement("p", { className: "text-gray-600 font-bold text-sm mt-1" }, type.desc)
                                    )
                                )
                            ))
                        ),

                        // Detail Popup
                        selectedType && (
                            React.createElement("div", { className: "mt-6 bg-[#2c3e50] p-1 rounded-lg shadow-2xl animate-pop-in" },
                                React.createElement("div", { className: "bg-white border-4 border-[#f39c12] p-6" },
                                    React.createElement("div", { className: "flex justify-between items-start mb-4 border-b-4 border-gray-100 pb-2" },
                                        React.createElement("div", { className: "flex flex-col gap-1" },
                                            React.createElement("span", { className: `text-xs font-bold text-white px-2 py-0.5 rounded w-fit ${selectedType.categoryColor}` }, selectedType.category),
                                            React.createElement("h4", { className: "text-2xl font-black text-[#d35400] flex items-center gap-2" },
                                                React.createElement(selectedType.icon), selectedType.title
                                            )
                                        ),
                                        React.createElement("button", { onClick: () => setSelectedType(null), className: "text-gray-400 hover:text-red-500" }, 
                                            React.createElement(XCircle, { size: 32 })
                                        )
                                    ),
                                    React.createElement("div", { className: "space-y-4" },
                                        React.createElement("p", { className: "text-lg font-bold text-gray-700" }, selectedType.details),
                                        React.createElement("div", { className: "bg-[#f4f1ea] p-4 border-l-8 border-[#27ae60]" },
                                            React.createElement("p", { className: "text-[#2c3e50] font-bold" }, selectedType.example)
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    // CTA
                    React.createElement("div", { className: "mt-12 bg-[#2c3e50] p-8 text-center border-4 border-[#d35400] shadow-[8px_8px_0px_#d35400]" },
                        React.createElement("h3", { className: "text-2xl font-bold mb-4 text-white" }, "準備好進入電腦餐廳了嗎？"),
                        React.createElement("button", {
                            onClick: () => setTab('units'),
                            className: "retro-btn bg-[#27ae60] text-white px-8 py-3 text-xl rounded hover:bg-[#2ecc71] flex items-center gap-2 mx-auto"
                        },
                            "開始探索", React.createElement(ArrowRight, { size: 24 })
                        )
                    )
                )
            );
        };

        // 3. Units Section

            const [streak, setStreak] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);

            // Initialize shuffled questions on start
            const startGame = () => {
                setGameQuestions(shuffleArray(initialQuestions));
                setGameState('playing');
            };

            const handleAnswer = (idx) => {
                const currentQuestion = gameQuestions[currentQ];
                const isCorrect = idx === currentQuestion.correct;
                
                if (isCorrect) {
                    setScore(prev => prev + 100 + (streak * 10));
                    setStreak(prev => prev + 1);
                    setCorrectCount(prev => prev + 1);
                    setFeedback('correct');
                    playSound('correct'); // Sound Effect
                    setShowConfetti(true);
                } else {
                    setLives(prev => prev - 1);
                    setStreak(0);
                    setFeedback('wrong');
                    playSound('wrong'); // Sound Effect
                }
                
                setTimeout(() => {
                    setFeedback(null);
                    setShowConfetti(false);
                    
                    if (!isCorrect && lives <= 1) {
                        setGameState('end');
                    } else if (currentQ < gameQuestions.length - 1) {
                        setCurrentQ(prev => prev + 1);
                    } else {
                        playSound('win'); // Win sound
                        setGameState('end');
                    }
                }, 1000);
            };

            const resetGame = () => {
                setScore(0);
                setCorrectCount(0);
                setCurrentQ(0);
                setLives(3);
                setStreak(0);
                setGameState('name');
            };

            const getRank = () => {
                const total = gameQuestions.length || 1;
                const percentage = correctCount / total;
                if (percentage >= 0.9) return { title: "🍄 米其林三星主廚", icon: "⭐⭐⭐" };
                if (percentage >= 0.7) return { title: "👨‍🍳 資深大廚", icon: "⭐⭐" };
                if (percentage >= 0.4) return { title: "🔪 廚房二廚", icon: "⭐" };
                return { title: "🥔 廚房學徒", icon: "" };
            };

            return (
                React.createElement("div", { className: "max-w-3xl mx-auto p-4 pb-20" },
                    React.createElement("div", { className: "relative tech-bg border-4 border-[#00aa2f] rounded-lg shadow-[0_0_20px_#00aa2f] min-h-[500px] flex flex-col overflow-hidden scanline" },
                        
                        // Confetti (Visual Only)
                        showConfetti && Array.from({ length: 20 }).map((_, i) => 
                            React.createElement("div", { 
                                key: i, 
                                className: "confetti",
                                style: { 
                                    left: `${Math.random() * 100}%`, 
                                    animationDelay: `${Math.random() * 0.5}s`,
                                    backgroundColor: ['#f1c40f', '#e74c3c', '#2ecc71', '#3498db'][Math.floor(Math.random() * 4)]
                                } 
                            })
                        ),

                        // Name Input Screen
                        gameState === 'name' && (
                            React.createElement("div", { className: "flex-1 flex flex-col items-center justify-center text-center p-8 space-y-6" },
                                React.createElement("h2", { className: "text-3xl font-black text-[#00ff46] mb-4 font-mono tracking-widest" }, "IDENTIFY YOURSELF"),
                                React.createElement("input", {
                                    type: "text",
                                    placeholder: "輸入大廚姓名",
                                    value: playerName,
                                    onChange: (e) => setPlayerName(e.target.value),
                                    className: "bg-black border-2 border-[#00ff46] text-white text-2xl p-4 text-center focus:outline-none focus:shadow-[0_0_15px_#00ff46] font-mono w-full max-w-xs uppercase cursor-none" // hide cursor on input too if needed
                                }),
                                React.createElement("button", {
                                    onClick: () => { if(playerName.trim()) setGameState('start'); },
                                    className: `retro-btn bg-[#00ff46] text-black px-8 py-3 rounded text-xl ${!playerName.trim() ? 'opacity-50 cursor-not-allowed' : ''}`
                                },
                                    "確認 ENTER"
                                )
                            )
                        ),

                        // Start Screen
                        gameState === 'start' && (
                            React.createElement("div", { className: "flex-1 flex flex-col items-center justify-center text-center p-8 space-y-8" },
                                React.createElement("div", { className: "text-6xl animate-bounce-slow" }, "🏆"),
                                React.createElement("div", null,
                                    React.createElement("h2", { className: "text-4xl font-black text-[#f1c40f] mb-4 font-mono" }, `WELCOME, ${playerName}!`),
                                    React.createElement("p", { className: "text-[#00ff46] text-xl font-mono" }, "SYSTEM READY. START CHALLENGE?")
                                ),
                                React.createElement("button", {
                                    onClick: startGame,
                                    className: "retro-btn bg-[#e74c3c] text-white px-10 py-4 text-2xl rounded hover:bg-[#c0392b]"
                                },
                                    "START GAME"
                                )
                            )
                        ),

                        // Playing
                        gameState === 'playing' && gameQuestions.length > 0 && (
                            React.createElement("div", { className: "flex-1 flex flex-col p-6" },
                                // HUD
                                React.createElement("div", { className: "flex justify-between items-center mb-8 border-b-2 border-[#00ff46] pb-4" },
                                    React.createElement("div", { className: "flex gap-6" },
                                        React.createElement("div", { className: "flex items-center gap-2 text-[#e74c3c]" },
                                            React.createElement(Heart, { className: "fill-current" }),
                                            React.createElement("span", { className: "font-black text-xl font-mono" }, lives)
                                        ),
                                        React.createElement("div", { className: "flex items-center gap-2 text-[#f1c40f]" },
                                            React.createElement(Star, { className: "fill-current" }),
                                            React.createElement("span", { className: "font-black text-xl font-mono" }, score)
                                        )
                                    ),
                                    React.createElement("div", { className: "text-[#00ff46] font-mono text-xl" },
                                        `Q: ${currentQ + 1}/${gameQuestions.length}`
                                    )
                                ),

                                // Question
                                React.createElement("div", { className: "flex-1 flex flex-col justify-center" },
                                    React.createElement("h3", { className: "text-2xl md:text-3xl font-black text-white text-center mb-8 leading-relaxed font-mono" },
                                        gameQuestions[currentQ].q
                                    ),

                                    React.createElement("div", { className: "grid grid-cols-1 gap-4" },
                                        gameQuestions[currentQ].options.map((opt, idx) => (
                                            React.createElement("button", {
                                                key: idx,
                                                onClick: () => !feedback && handleAnswer(idx),
                                                disabled: !!feedback,
                                                className: `
                                                    p-4 rounded border-2 text-left font-bold text-lg transition-all font-mono
                                                    ${feedback === 'correct' && idx === gameQuestions[currentQ].correct 
                                                        ? 'bg-[#2ecc71] border-[#27ae60] text-black' 
                                                        : feedback === 'wrong' && idx === gameQuestions[currentQ].correct
                                                            ? 'bg-[#2ecc71] border-[#27ae60] text-black opacity-50'
                                                            : ''}
                                                    ${feedback === 'wrong' && idx !== gameQuestions[currentQ].correct && 'opacity-50'}
                                                    ${!feedback 
                                                        ? 'bg-black/50 border-[#00ff46] text-[#00ff46] hover:bg-[#00ff46] hover:text-black' 
                                                        : ''}
                                                `
                                            },
                                                opt
                                            )
                                        ))
                                    )
                                ),

                                // Feedback Text
                                feedback && (
                                    React.createElement("div", { className: "absolute inset-0 flex items-center justify-center pointer-events-none z-20 bg-black/50" },
                                        React.createElement("div", { className: `text-7xl font-black font-mono ${feedback === 'correct' ? 'text-[#2ecc71]' : 'text-[#e74c3c]'}` },
                                            feedback === 'correct' ? (streak > 1 ? `COMBO x${streak}!` : "CORRECT!") : "WRONG!"
                                        )
                                    )
                                )
                            )
                        ),

                        // End
                        gameState === 'end' && (
                            React.createElement("div", { className: "flex-1 flex flex-col items-center justify-center text-center p-8 space-y-6" },
                                React.createElement("h2", { className: "text-4xl font-black text-[#00ff46] font-mono" }, "MISSION COMPLETE"),
                                React.createElement("div", { className: "text-8xl mb-2" }, getRank().icon),
                                React.createElement("h3", { className: "text-2xl font-bold text-white font-mono" }, `AGENT: ${playerName}`),
                                React.createElement("h3", { className: "text-3xl font-bold text-[#f1c40f]" }, getRank().title),
                                
                                React.createElement("div", { className: "bg-black/80 p-6 rounded border-2 border-[#00ff46] w-full max-w-sm font-mono" },
                                    React.createElement("div", { className: "flex justify-between mb-2" },
                                        React.createElement("span", { className: "text-gray-300" }, "SCORE"),
                                        React.createElement("span", { className: "text-white font-bold" }, score)
                                    ),
                                    React.createElement("div", { className: "flex justify-between" },
                                        React.createElement("span", { className: "text-gray-300" }, "CORRECT"),
                                        React.createElement("span", { className: "text-[#2ecc71] font-bold" }, `${correctCount} / ${gameQuestions.length}`)
                                    )
                                ),
                                
                                React.createElement("button", {
                                    onClick: resetGame,
                                    className: "retro-btn bg-[#3498db] text-white px-8 py-3 rounded flex items-center gap-2 mt-4"
                                },
                                    React.createElement(RefreshCw), "RETRY"
                                )
                            )
                        )
                    )
                )
            );
        };

        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('intro');
            
            // Enable custom cursor effect
            useMouseEffect();

            return (
                React.createElement("div", { className: "min-h-screen font-sans text-[#2c3e50]" },
                    React.createElement(Navbar, { activeTab: activeTab, setActiveTab: setActiveTab }),

                    React.createElement("main", { className: "container mx-auto px-2 py-6" },
                        activeTab === 'intro' && React.createElement(IntroSection, { setTab: setActiveTab }),
                        activeTab === 'units' && React.createElement(UnitsSection, null),
                        activeTab === 'flow' && React.createElement(FlowSection, null),
                        activeTab === 'cards' && React.createElement(FlashcardsSection, null),
                        activeTab === 'game' && React.createElement(GameSection, null)
                    ),

                    React.createElement("footer", { className: "mt-auto text-center text-gray-500 text-sm p-8 border-t-4 border-[#ccc]" },
                        React.createElement("p", null, "© 2025 CYIT Classroom | 國中資訊科技"),
                        React.createElement("p", { className: "mt-2" }, "Style: Retro Pixel / Content: System Platform"),
                        // GitHub Link in Footer
                        React.createElement("a", { 
                            href: "https://github.com/mushroomonthehill", 
                            target: "_blank", 
                            rel: "noopener noreferrer",
                            className: "inline-flex items-center gap-2 mt-4 text-gray-600 hover:text-[#2c3e50] transition-colors"
                        },
                            React.createElement(Github, { size: 20 }),
                            React.createElement("span", null, "GitHub")
                        )
                    )
                )
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
